services:
  db:
    image: postgres:16
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./Backend
    ports:
      - "5000:8080"
    env_file: .env
    environment:
      - ConnectionStrings__Default=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Auth__Secret=${JWT_SECRET}
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: